<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AuraConnect — Контакты</title>
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/workspace.css">
    <link rel="stylesheet" href="/css/desktop.css">
    <link rel="stylesheet" href="/css/contacts.css">   <!-- стили для страницы контактов -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.11.0/sha256.min.js"></script>
    <script src="/js/api.js"></script>
    <link rel="stylesheet" href="/css/protect.css">
</head>
<body>

<div class="header-container"></div>

<div class="header">
    <div class="logo">
        <a href="/">
            <div class="left_align">
                <h1>AuraConnect</h1>
                <p>Коммуникационная платформа</p>
            </div>
        </a>
    </div>
    <div class="navigation">
        <div class="stroke_margin">
            <div class="stroke"></div>
        </div>
        <div class="navigation_gap">
            <div class="tabs_container">
                <div class="tab_container_arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7.41 10.59L2.83 6L7.41 1.41L6 0L0 6L6 12L7.41 10.59Z" fill="#A9A9A9"/>
                    </svg>
                </div>
                <div class="tabs">
                    <!-- Здесь могут быть динамические вкладки, но для страницы контактов они не нужны -->
                </div>
                <div class="tab_container_arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 1.41L4.58 6L0 10.59L1.41 12L7.41 6L1.41 0L0 1.41Z" fill="#A9A9A9"/>
                    </svg>
                </div>
            </div>
            <div class="searchline_container">
                <div class="searchline">
                    <div class="insert_line">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10.7204 9.43396H10.0429L9.80274 9.2024C10.6432 8.2247 11.1492 6.9554 11.1492 5.57461C11.1492 2.49571 8.65352 0 5.57461 0C2.49571 0 0 2.49571 0 5.57461C0 8.65352 2.49571 11.1492 5.57461 11.1492C6.9554 11.1492 8.2247 10.6432 9.2024 9.80274L9.43396 10.0429V10.7204L13.7221 15L15 13.7221L10.7204 9.43396ZM5.57461 9.43396C3.43911 9.43396 1.71527 7.71012 1.71527 5.57461C1.71527 3.43911 3.43911 1.71527 5.57461 1.71527C7.71012 1.71527 9.43396 3.43911 9.43396 5.57461C9.43396 7.71012 7.71012 9.43396 5.57461 9.43396Z" fill="#444444"/>
                        </svg>
                        <p>Поиск клиентов, звонков, задач...</p>
                    </div>
                </div>
            </div>
            <div class="right_part">
                <div class="notifications">
                    <div class="number_background">
                        <p>5</p>
                    </div>
                    <div class="hover_background_notifications">
                        <svg width="17" height="21" viewBox="0 0 17 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8.5 21C9.66875 21 10.625 20.0308 10.625 18.8462H6.375C6.375 20.0308 7.32062 21 8.5 21ZM14.875 14.5385V9.15385C14.875 5.84769 13.1325 3.08 10.0938 2.34769V1.61538C10.0938 0.721539 9.38187 0 8.5 0C7.61813 0 6.90625 0.721539 6.90625 1.61538V2.34769C3.85688 3.08 2.125 5.83692 2.125 9.15385V14.5385L0 16.6923V17.7692H17V16.6923L14.875 14.5385Z" fill="#444444"/>
                        </svg>
                    </div>
                </div>
                <div class="history">
                    <div class="hover_background_history">
                        <svg width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10.4322 21C7.59705 21 5.17196 20.02 3.15695 18.06C1.14213 16.1001 0.089811 13.7018 0 10.865H2.18814C2.28234 13.0981 3.1194 14.9841 4.69931 16.5229C6.27922 18.0618 8.19009 18.8312 10.4319 18.8312C12.7722 18.8312 14.7567 18.0125 16.3855 16.3752C18.0142 14.7377 18.8285 12.7486 18.8285 10.4078C18.8285 8.10502 18.0087 6.15692 16.3692 4.56351C14.7297 2.9701 12.7506 2.1734 10.4319 2.1734C9.16884 2.1734 7.98247 2.45605 6.87283 3.02135C5.763 3.58665 4.80412 4.349 3.9962 5.3084H6.89375V7.31519H0.454023V0.911499H2.44926V3.74706C3.45323 2.57295 4.64705 1.65496 6.03071 0.993089C7.41437 0.33103 8.88144 0 10.4319 0C11.8895 0 13.2592 0.274537 14.5408 0.823612C15.8222 1.3725 16.9423 2.11891 17.9009 3.06286C18.8594 4.0068 19.6156 5.1124 20.1693 6.37964C20.7231 7.64689 21 9.00841 21 10.4642C21 11.9198 20.7231 13.2877 20.1693 14.5677C19.6156 15.8477 18.8594 16.9629 17.9009 17.9131C16.9423 18.8633 15.8222 19.6154 14.5408 20.1692C13.2592 20.7231 11.8896 21 10.4322 21ZM13.9182 15.2619L9.52331 10.9105V4.71953H11.5185V10.0823L15.3436 13.8385L13.9182 15.2619Z" fill="#444444"/>
                        </svg>
                    </div>
                </div>
                <div class="profile_info">
                    <div class="role_and_picture">
                        <div class="picture">
                            <p>ИИ</p>
                        </div>
                    </div>
                    <div class="name">
                        <p>Иван Иванов</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="page_body">
    <div class="sidebar">
        <div class="sidebar_block">
            <div class="headline_frame">
                <p>ОСНОВНОЕ</p>
            </div>
            <div class="sidebar_option">
                <a href="/workspace.html" class="sidebar_option_content active">
                    <div class="tab_icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 6h16v2H4V6zm0 4h16v2H4v-2zm0 4h10v2H4v-2zm12 0h4v2h-4v-2z" fill="#444"/>
                        </svg>
                    </div>
                    <div class="option_text">Рабочая область</div>
                </a>
            </div>
            <div class="sidebar_option">
                <a href="/contacts.html" class="sidebar_option_content active">
                    <div class="tab_icon">
                        <!-- иконка контактов -->
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="#444"/>
                        </svg>
                    </div>
                    <div class="option_text">Контакты</div>
                </a>
            </div>
        </div>
    </div>

    <div class="page_body_content contacts-page-content">
        <!-- Здесь будет динамическое содержимое, управляемое ContactsPage.js -->
        <div class="contacts-list-view">
            <div class="contacts-header">
                <button class="create-contact-btn">+ Создать контакт</button>
            </div>
            <div class="contacts-list"></div>
        </div>

        <div class="contact-detail-view" style="display: none;">
            <div class="detail-header">
                <button class="back-to-list-btn">← Назад к списку</button>
            </div>

            <div class="contact-info-block">
                <h3>Информация о контакте</h3>
                <div class="contact-info-fields">
                    <input type="text" class="contact-name-input" placeholder="Имя контакта">
                    <button class="save-contact-btn">Сохранить</button>
                </div>
            </div>

            <div class="add-connection-block">
                <h3>Добавление connection</h3>
                <div class="add-connection-fields">
                    <select class="channel-select">
                        <option value="telegram">Telegram</option>
                        <option value="sms">SMS (Phone)</option>
                        <option value="mail">Email</option>
                    </select>
                    <input type="text" class="identifier-input" placeholder="Идентификатор">
                    <button class="create-connection-btn">Создать</button>
                </div>
            </div>

            <div class="connections-list-block">
                <h3>Список connections</h3>
                <div class="connections-list"></div>
            </div>
        </div>
    </div>
</div>

<script src="/js/protect.js"></script>
<script src="/js/ContactsPage.js"></script>
</body>
</html>
