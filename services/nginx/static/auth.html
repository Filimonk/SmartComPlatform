<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Войти - AuraConnect</title>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.11.0/sha256.min.js"></script>
    <script src="/js/api.js"></script>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    
<div class="eyebrow">
    <div class="logo">
        <a href="/">
            <div class="left-align">
                <h1>AuraConnect</h1>
                <p>Коммуникационная платформа</p>
            </div>
        </a>
    </div>
</div>
<div class="content">
    <div class="greeting">
        <h1>Рады Вас видеть на AuraConnect!</h1>
        <p>Совершенствуем процессы ваших коммуникаций</p>

            </svg>
        </div>
        <p>Чтобы воспользоваться платформой, войдите в свой аккаунт. Если у Вас еще нет аккаунта, зарегистрируйтесь!</p>
    </div>
    <div class="auth_form">
        <div class="header">
            <p>Вход</p>
        </div>
        <form class="form">
            <div class="auth_form_line">
                <input type="email" class="input" name="email" placeholder="Введите адрес вашей почты">
                <div class="message">
                    <p>
                        
                    </p>
                </div>
            </div>
            <div class="auth_form_line hidden" id="name-field">
                <input type="text" class="input" name="name" placeholder="Введите ваше имя">
                <div class="message">
                    <p>
                        
                    </p>
                </div>
            </div>
            <div class="auth_form_line">
                <input type="password" class="input" name="password" placeholder="Придумайте и введите надежный пароль">
                <div class="message">
                    <p>
                        <!-- Обязательное поле --> 
                    </p>
                </div>
            </div>
            <div class="submit">
                <button type="button" class="submit_button">
                    <p>Войти</p>
                </button>
            </div>
        </form>
        <div class="toggle">
            <a href="#">
                <p>Нет аккаунта? Зарегистрироваться</p>
            </a>
        </div>
    </div>
</div>

<script src="/js/AuthPage.js"></script>
</body>
</html>
