components:
  schemas:
    ErrorCode:
      type: string
      enum:
        - MISSING_TEXT
        - INVALID_REQUEST_FORMAT
        - FOREIGN_KEY_VIOLATION
        - INTERNAL_ERROR

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string

