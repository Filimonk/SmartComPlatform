components:
  schemas:

    SendSmsRequest:
      type: object
      required:
        - contactId
        - channel
        - text
      properties:
        contactId:
          type: string
          format: uuid
        channel:
          type: string
        text:
          type: string

    SendSmsResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid

    CreateContactResponse:
      type: object
      required:
        - contactId
        - contactName
      properties:
        contactId:
          type: string
          format: uuid
        contactName:
          type: string

    ModifyContactRequest:
      type: object
      required:
      properties:
        contactName:
          type: string

    ModifyContactResponse:
      type: object
      required:
        - contactId
        - contactName
      properties:
        contactId:
          type: string
          format: uuid
        contactName:
          type: string

    CreateConnectionRequest:
      type: object
      required:
        - channelType
      properties:
        channelType:
          $ref: './entities.yaml#/components/schemas/ChannelType'
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    CreateConnectionResponse:
      type: object
      required:
        - contactId
        - connectionId
        - channelType
      properties:
        contactId:
          type: string
          format: uuid
        connectionId:
          type: string
          format: uuid
        channelType:
          $ref: './entities.yaml#/components/schemas/ChannelType'
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string

