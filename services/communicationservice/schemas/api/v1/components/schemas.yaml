components:
  schemas:

    SendSmsRequest:
      type: object
      required:
        - contactId
        - text
      properties:
        contactId:
          type: string
          format: uuid
        text:
          type: string

    SendSmsResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid

    CreateContactResponse:
      type: object
      required:
        - contactId
        - contactName
      properties:
        contactId:
          type: string
          format: uuid
        contactName:
          type: string

    ModifyContactRequest:
      type: object
      required:
      properties:
        contactName:
          type: string

    ModifyContactResponse:
      type: object
      required:
        - contactId
        - contactName
      properties:
        contactId:
          type: string
          format: uuid
        contactName:
          type: string

    CreateConnectionRequest:
      type: object
      required:
        - channel
      properties:
        channel:
          $ref: './entities.yaml#/components/schemas/ChannelType'
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    CreateConnectionResponse:
      type: object
      required:
        - id
        - contactId
        - isActive
        # - channel
      properties:
        id:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        isActive:
          type: boolean
        # channel:
          # type: string
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    GetAllContactsResponse:
      type: object
      required:
        - contacts
      properties:
        contacts:
          type: array
          items:
            type: object
            required:
              - contactId
              - contactName
            properties:
              contactId:
                type: string
                format: uuid
              contactName:
                type: string

    GetAllConnectionsResponse:
      type: object
      required:
        - connections
      properties:
        connections:
          type: array
          items:
            type: object
            required:
              - id
              - contactId
              - isActive
            properties:
              id:
                type: string
                format: uuid
              contactId:
                type: string
                format: uuid
              isActive:
                type: boolean
              phoneNumber:
                type: string
              mailAddress:
                type: string
              commonIdentifier:
                type: string

