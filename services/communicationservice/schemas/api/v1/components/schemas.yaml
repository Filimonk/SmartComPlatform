components:
  schemas:

    SendSmsRequest:
      type: object
      required:
        - contactId
        - channel
        - text
      properties:
        contactId:
          type: string
          format: uuid
        channel:
          type: string
        text:
          type: string

    SendSmsResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid

    CreateContactRequest:
      type: object
      required:
      properties:
        contactName:
          type: string
        phoneNumber:
          type: string
        mailIdentifier:
          type: string
        telegramIdentifier:
          type: string
        auraConnectIdentifier:
          type: string

    CreateContactResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid

