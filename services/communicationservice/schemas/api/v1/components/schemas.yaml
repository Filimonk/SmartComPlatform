components:
  schemas:

    CreateChildRequest:
      type: object
      required:
        - name
        - age
      properties:
        name:
          type: string
        age:
          type: integer
          minimum: 0

    ChildResponse:
      type: object
      required:
        - id
        - name
        - age
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer

