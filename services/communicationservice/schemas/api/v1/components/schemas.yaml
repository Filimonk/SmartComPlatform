components:
  schemas:

    SendMessageRequest:
      type: object
      required:
        - contactId
        - text
      properties:
        originConnectionId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        connectionId:
          type: string
          format: uuid
        text:
          type: string

    SendMessageResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid

    CreateContactResponse:
      type: object
      required:
        - contactId
        - contactName
      properties:
        contactId:
          type: string
          format: uuid
        contactName:
          type: string

    ModifyContactRequest:
      type: object
      required:
      properties:
        contactName:
          type: string

    ModifyContactResponse:
      type: object
      required:
        - contactId
        - contactName
      properties:
        contactId:
          type: string
          format: uuid
        contactName:
          type: string

    CreateConnectionRequest:
      type: object
      required:
        - channel
      properties:
        channel:
          $ref: './entities.yaml#/components/schemas/ChannelType'
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    CreateConnectionResponse:
      type: object
      required:
        - id
        - contactId
        - isActive
        # - channel
      properties:
        id:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        isActive:
          type: boolean
        # channel:
          # type: string
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    GetAllContactsResponse:
      type: object
      required:
        - contacts
      properties:
        contacts:
          type: array
          items:
            type: object
            required:
              - contactId
              - contactName
            properties:
              contactId:
                type: string
                format: uuid
              contactName:
                type: string

    GetAllConnectionsResponse:
      type: object
      required:
        - connections
      properties:
        connections:
          type: array
          items:
            type: object
            required:
              - id
              - contactId
              - isActive
            properties:
              id:
                type: string
                format: uuid
              contactId:
                type: string
                format: uuid
              isActive:
                type: boolean
              phoneNumber:
                type: string
              mailAddress:
                type: string
              commonIdentifier:
                type: string

    GetAllMessagesResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            type: object
            required:
              - id
              - channel
              - text
              - isIncoming
              - createdAt
            properties:
              id:
                type: string
                format: uuid
              channel:
                type: string
                # $ref: './entities.yaml#/components/schemas/ChannelType'
              text:
                type: string
              isIncoming:
                type: boolean
              createdAt:
                type: string
                format: date-time
          
    CreateOriginResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    GetOriginResponse:
      type: object
      required:
        - id
        - name
        - requiresAction
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        channel:
          $ref: './entities.yaml#/components/schemas/ChannelType'
        apiKey:
          type: string
        emailServerAddress:
          type: string
        provider:
          type: string
        requiresAction:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ModifyOriginRequest:
      type: object
      required:
      properties:
        name:
          type: string
        channel:
          $ref: './entities.yaml#/components/schemas/ChannelType'
        apiKey:
          type: string
        emailServerAddress:
          type: string
        provider:
          type: string

    ModifyOriginResponse:
      $ref: '#/components/schemas/GetOriginResponse'

    GetAllOriginsResponse:
      type: object
      required:
        - origins
      properties:
        origins:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - requiresAction
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              channel:
                $ref: './entities.yaml#/components/schemas/ChannelType'
              apiKeyMasked:
                type: string
              provider:
                type: string
              requiresAction:
                type: boolean

    CreateOriginConnectionRequest:
      type: object
      required:
      properties:
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    CreateOriginConnectionResponse:
      type: object
      required:
        - id
        - originId
        - isActive
      properties:
        id:
          type: string
          format: uuid
        originId:
          type: string
          format: uuid
        isActive:
          type: boolean
        phoneNumber:
          type: string
        mailAddress:
          type: string
        commonIdentifier:
          type: string
          
    GetAllOriginConnectionsResponse:
      type: object
      required:
        - connections
      properties:
        connections:
          type: array
          items:
            type: object
            required:
              - id
              - originId
              - isActive
            properties:
              id:
                type: string
                format: uuid
              originId:
                type: string
                format: uuid
              isActive:
                type: boolean
              phoneNumber:
                type: string
              mailAddress:
                type: string
              commonIdentifier:
                type: string

    SpellCheckRequest:
      type: object
      required:
        - Authorization
        - text
      properties:
        Authorization:
          type: string
        text:
          type: string
          
    SpellCheckResponse:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          
    GetAllTasksResponse:
      type: object
      required:
        - tasks
      properties:
        tasks:
          type: array
          items:
            $ref: './entities.yaml#/components/schemas/Task'

    CreateTaskRequest:
      type: object
      required:
        - text
        - dueDate
      properties:
        text:
          type: string
        dueDate:
          type: string
          format: date-time

    ChangeTaskStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: './entities.yaml#/components/schemas/TaskStatusType'

    # ChangeTaskStatusResponse:
    # type: object
    # required:
    # - id
    # - status
    # properties:
    # id:
    # type: string
    # format: uuid
    # status:
    # $ref: './entities.yaml#/components/schemas/TaskStatusType'

    GetAllExpiredTasksByUserResponse:
      type: object
      required:
        - tasks
      properties:
        tasks:
          type: array
          items:
            type: object
            required:
              - contactId
              - task
            properties:
              contactId:
                type: string
                format: uuid
              task:
                $ref: './entities.yaml#/components/schemas/Task'

    GetAllNotesResponse:
      type: object
      required:
        - notes
      properties:
        notes:
          type: array
          items:
            $ref: './entities.yaml#/components/schemas/Note'

    CreateNoteRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string

