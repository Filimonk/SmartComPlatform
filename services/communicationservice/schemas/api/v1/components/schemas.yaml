components:
  schemas:

    SendSmsRequest:
      type: object
      required:
        - contactId
        - channel
        - text
      properties:
        contactId:
          type: string
          format: uuid
        channel:
          type: string
        text:
          type: string

    SendSmsResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid

