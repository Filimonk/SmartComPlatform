components:
  schemas:

    ChannelType:
      type: string
      description: "Connection channel type"
      enum:
        - aura_connect
        - sms
        - telegram
        - whatsapp
        - mail
  
    MessageJob:
      type: object
      required:
        - id
        - userId
        - contactId
        - text
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: integer
        originConnectionId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        connectionId:
          type: string
          format: uuid
        text:
          type: string

    Task:
      type: object
      required:
        - id
        - text
        - dueDate
        - status
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        dueDate:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/TaskStatusType'

    TaskStatusType:
      type: string
      description: "Task status"
      enum:
        - active
        - archived

    Note:
      type: object
      required:
        - id
        - text
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        createdAt:
          type: string
          format: date-time

