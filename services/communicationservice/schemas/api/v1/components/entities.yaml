components:
  schemas:

    ChannelType:
      type: string
      description: "Connection channel type"
      enum:
        - aura_connect
        - sms
        - telegram
        - mail
  
    MessageJob:
      type: object
      required:
        - id
        - userId
        - contactId
        - text
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: integer
        originConnectionId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        connectionId:
          type: string
          format: uuid
        text:
          type: string

