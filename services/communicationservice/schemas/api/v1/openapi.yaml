openapi: 3.0.0
info:
  title: Model Postgres Service
  version: 1.0.0

paths:
  /v1/send/message:
    post:
      summary: Take the message and send it to the contact by contactId
      
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Unique key to prevent duplicate SMS sending

        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: JWT
      
      requestBody:
        $ref: '#/components/requests/SendMessageRequest'

      responses:
        '202':
          description: Accepted
          $ref: '#/components/responses/SendMessageResponse'
          
        '400':
          description: Bad request
          $ref: '#/components/responses/ErrorWithCode'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/ErrorWithCode'
        '429':
          description: Too Many Requests
          $ref: '#/components/responses/ErrorWithCode'
        '500':
          description: Internal Server Error
          $ref: '#/components/responses/ErrorWithCode'

  /v1/contact:
