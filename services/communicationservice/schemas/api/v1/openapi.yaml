openapi: 3.0.0
info:
  title: Model Postgres Service
  version: 1.0.0

paths:
  /v1/send/sms:
    post:
      summary: Take the message and send it to the chat by chatId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas.yaml#/components/schemas/SendSmsRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/components/schemas/SendSmsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/components/schemas/ErrorResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/components/schemas/ErrorResponse'

