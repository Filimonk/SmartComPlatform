components_manager:
    task_processors:                  # Task processor is an executor for coroutine tasks

        main-task-processor:          # Make a task processor for CPU-bound coroutine tasks.
            worker_threads: $worker-threads         # Process tasks in 4 threads.

        fs-task-processor:            # Make a separate task processor for filesystem bound tasks.
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    components:                       # Configuring components that were registered via component_list
        server:
            listener:                 # configuring the main listening socket...
                port: $server-port            # ...to listen on this port and...
                task_processor: main-task-processor    # ...process incoming requests on this task processor.

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard  # Drop logs if the system is too busy to write them down.

        testsuite-support: {}

        congestion-control:
            fake-mode: true
            only-rtc: false

        http-client:
        http-client-core:
            load-enabled: $is_testing
            fs-task-processor: fs-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        tests-control:
            load-enabled: $is-testing
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-v1-SendMessage:
            path: /v1/send/message
            method: POST
            task_processor: main-task-processor

        handler-v1-CreateContact:
            path: /v1/contact
            method: POST
            task_processor: main-task-processor

        handler-v1-ModifyContact:
            path: /v1/contact/{contactId}
            method: PATCH
            task_processor: main-task-processor

        handler-v1-CreateConnection:
            path: /v1/contact/{contactId}/connection
            method: POST
            task_processor: main-task-processor
        
        handler-v1-GetAllContacts:
          path: /v1/contact
          method: GET
          task_processor: main-task-processor
            
        handler-v1-GetAllConnections:
          path: /v1/contact/{contactId}/connection
          method: GET
          task_processor: main-task-processor

        handler-v1-GetAllMessages:
            path: /v1/contact/{contactId}/message
            method: GET
            task_processor: main-task-processor
        
        handler-v1-CreateOrigin:
          path: /v1/origin
          method: POST
          task_processor: main-task-processor
        
        handler-v1-GetOrigin:
          path: /v1/origin/{originId}
          method: GET
          task_processor: main-task-processor
        
        handler-v1-ModifyOrigin:
          path: /v1/origin/{originId}
          method: PATCH
          task_processor: main-task-processor
        
        handler-v1-GetAllOrigins:
          path: /v1/origin
          method: GET
          task_processor: main-task-processor
            
        handler-v1-CreateOriginConnection:
          path: /v1/origin/{originId}/connection
          method: POST
          task_processor: main-task-processor
       
        handler-v1-GetAllOriginConnections:
          path: /v1/origin/{originId}/connection
          method: GET
          task_processor: main-task-processor
        
        message-dispatcher:
          load-enabled: true
        
        telegram-message-fetcher:
          load-enabled: true
            
        websocket-handler-v1-SpellCheck:
            path: /v1/spellcheck
            method: GET
            task_processor: main-task-processor
        
        postgres-db:
            dbconnection#env: DB_CONNECTION
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            sync-start: true
            connlimit_mode: manual
